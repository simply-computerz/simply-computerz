<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Message Transmitted | Simply Computerz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --primary: #9d00ff;
            --primary-glow: rgba(157, 0, 255, 0.4);
            --secondary: #00ff66;
            --secondary-glow: rgba(0, 255, 102, 0.4);
            --text-light: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-light);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        .success-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            position: relative;
        }

        .success-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 20px 20px 0 0;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 25px;
            display: inline-block;
            filter: drop-shadow(0 0 15px var(--secondary-glow));
            animation: pulse-icon 2s infinite alternate;
        }

        @keyframes pulse-icon {
            0% { transform: scale(0.95); filter: drop-shadow(0 0 10px var(--secondary-glow)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 25px var(--secondary-glow)); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--primary-glow);
        }

        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-home {
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            display: inline-block;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary), #6000a3);
            color: white;
            border: none;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-home:hover {
            box-shadow: 0 6px 20px var(--primary-glow);
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
    <div class="success-panel">
        <span class="icon">🚀</span>
        <h1>Transmission Received</h1>
        <p>Your message has been sent successfully. We have captured the data and will respond as fast as possible.</p>
        <a href="index.html" class="btn-home">Return to Site</a>
    </div>
</body>
</html>
